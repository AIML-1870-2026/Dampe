<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval Kingdom Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="canvas" width="800" height="450"></canvas>

    <div id="ui">

      <!-- ===== MAIN MENU ===== -->
      <div id="menu-screen" class="screen">
        <div class="menu-inner">
          <h1 class="title-line1">Medieval</h1>
          <h1 class="title-line2">Kingdom</h1>
          <h1 class="title-line3">Runner</h1>
          <div class="menu-best">BEST: <span id="menu-best">0</span></div>
          <button id="start-btn" class="px-btn">▶  START GAME</button>
          <div class="controls-hint">
            <p>SPACE / ↑ / CLICK — Jump</p>
            <p>Hold longer for higher jump</p>
            <p>R — Restart after death</p>
          </div>
        </div>
      </div>

      <!-- ===== GAME OVER ===== -->
      <div id="gameover-screen" class="screen hidden">
        <div class="gameover-inner">
          <h2 class="gameover-title">GAME OVER</h2>
          <div class="score-row">SCORE <span id="go-score">0</span></div>
          <div class="score-row">BEST  <span id="go-best">0</span></div>
          <div id="new-record" class="new-record hidden">✦ NEW HIGH SCORE ✦</div>
          <div class="gameover-btns">
            <button id="restart-btn" class="px-btn">▶  PLAY AGAIN</button>
            <button id="menu-btn"    class="px-btn secondary">MAIN MENU</button>
          </div>
        </div>
      </div>

    </div><!-- #ui -->
  </div>

  <script src="game.js"></script>
</body>
</html>
